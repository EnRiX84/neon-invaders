  ╔══════════════════════════════════════════════════════════╗

  • Change colours  → edit skin CSS variables
  • Change gameplay → edit CFG object in JS
  • AdSense         → uncomment <ins> tags and replace IDs
  • Title / texts   → search "NEON INVADERS" in HTML section
  ────────────────────────────────────────────────────────────

<style>
/* ═══ RESET ════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══ CSS CUSTOM PROPERTIES  (skins) ══════════════════════ */
:root{
  --bg:#0a0a1a; --bg2:#12122a;
  --accent:#00f5d4; --accent2:#f700ff;
  --shadow:rgba(0,245,212,.35);
  --text:#fff; --dim:rgba(255,255,255,.45);
  --grid:rgba(255,255,255,.04);
  --fh:'Orbitron',sans-serif; --fu:'Rajdhani',sans-serif;
}
body.skin-retro{
  --bg:#001a00; --bg2:#002200;
  --accent:#33ff33; --accent2:#00cc00;
  --shadow:rgba(51,255,51,.35);
  --text:#c0ffc0; --dim:rgba(192,255,192,.45);
  --grid:rgba(51,255,51,.05);
}
body.skin-sunset{
  --bg:#1a0a00; --bg2:#221000;
  --accent:#ff6600; --accent2:#ff3300;
  --shadow:rgba(255,102,0,.35);
  --text:#ffd0a0; --dim:rgba(255,208,160,.45);
  --grid:rgba(255,102,0,.05);
}

/* ═══ BASE ══════════════════════════════════════════════════ */
html,body{width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--fu);touch-action:none;user-select:none}

/* ═══ LAYOUT ════════════════════════════════════════════════ */
#app{display:flex;flex-direction:column;align-items:center;height:100%;position:relative}

#ad-top{
  width:100%;max-width:728px;min-height:50px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.03);
  border-bottom:1px solid var(--grid);
  font-size:11px;color:var(--dim);letter-spacing:2px;
  text-transform:uppercase;font-family:var(--fu);
}
#game-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;width:100%}
canvas{display:block;touch-action:none}

/* ═══ HUD ═══════════════════════════════════════════════════ */
#hud{
  position:absolute;top:12px;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:0 16px;pointer-events:none;z-index:10;
}
.hud-box{display:flex;flex-direction:column;gap:2px}
.hud-label{font-family:var(--fu);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}
.hud-value{font-family:var(--fh);font-size:clamp(22px,5vw,32px);font-weight:900;color:var(--accent);line-height:1;text-shadow:0 0 20px var(--shadow)}
#hud.hidden{display:none}

/* Lives display */
#lives-wrap{position:absolute;bottom:12px;left:16px;pointer-events:none;z-index:10;display:flex;gap:6px}
#lives-wrap.hidden{display:none}
.life-icon{width:14px;height:10px;position:relative}
.life-icon::before{content:'';position:absolute;inset:0;
  clip-path:polygon(50% 0%,100% 100%,75% 100%,50% 70%,25% 100%,0% 100%);
  background:var(--accent);box-shadow:0 0 6px var(--shadow)}

/* ═══ SCREENS ═══════════════════════════════════════════════ */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  z-index:20;padding:24px;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
}
.screen::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}
.screen.hidden{display:none!important}

.title{
  font-family:var(--fh);font-size:clamp(28px,8vw,56px);font-weight:900;
  text-transform:uppercase;line-height:1;text-align:center;
  position:relative;z-index:1;letter-spacing:-1px;
}
.title span{display:block;color:var(--accent);text-shadow:0 0 40px var(--shadow),0 0 80px var(--shadow)}
.subtitle{font-family:var(--fu);font-size:clamp(12px,3vw,15px);letter-spacing:4px;text-transform:uppercase;color:var(--dim);position:relative;z-index:1;text-align:center}

/* Buttons */
.btn{
  font-family:var(--fh);font-size:clamp(13px,3.5vw,17px);font-weight:700;
  letter-spacing:3px;text-transform:uppercase;
  border:2px solid var(--accent);background:transparent;color:var(--accent);
  padding:13px 36px;cursor:pointer;position:relative;z-index:1;
  transition:all .15s ease;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  min-width:190px;
}
.btn:hover,.btn:active{background:var(--accent);color:var(--bg);box-shadow:0 0 30px var(--shadow);transform:scale(1.04)}
.btn-sm{border-color:var(--dim);color:var(--dim);font-size:clamp(11px,2.8vw,13px);padding:9px 24px;min-width:140px}
.btn-sm:hover,.btn-sm:active{background:var(--dim);color:var(--bg);box-shadow:none}

/* Score */
.score-wrap{text-align:center;position:relative;z-index:1}
.score-big{font-family:var(--fh);font-size:clamp(60px,17vw,96px);font-weight:900;color:var(--accent);line-height:1;text-shadow:0 0 60px var(--shadow)}
.score-lbl{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--dim);margin-top:4px}
#new-best{font-family:var(--fh);font-size:13px;letter-spacing:3px;color:var(--accent2);display:none;position:relative;z-index:1}

/* Leaderboard */
.lb-title{font-family:var(--fh);font-size:clamp(18px,5vw,26px);font-weight:900;letter-spacing:2px;text-align:center;position:relative;z-index:1}
#lb-table{width:100%;max-width:320px;position:relative;z-index:1}
.lb-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--grid)}
.lb-rank{font-family:var(--fh);font-size:13px;color:var(--dim);width:26px}
.lb-rank.g{color:#ffd700}.lb-rank.s{color:#c0c0c0}.lb-rank.b{color:#cd7f32}
.lb-name{flex:1;font-size:15px;font-weight:600;padding-left:8px}
.lb-score{font-family:var(--fh);font-size:16px;color:var(--accent)}
.lb-empty{text-align:center;color:var(--dim);font-size:13px;letter-spacing:2px;padding:20px}

/* Player name input */
.name-wrap{position:relative;z-index:1;display:flex;align-items:center;gap:10px}
.name-wrap label{font-family:var(--fu);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}
.name-input{
  font-family:var(--fh);font-size:14px;font-weight:700;
  background:transparent;border:1px solid var(--dim);color:var(--text);
  padding:7px 14px;width:140px;text-align:center;letter-spacing:1px;
  outline:none;transition:border-color .2s;
}
.name-input:focus{border-color:var(--accent)}
.name-input::placeholder{color:var(--dim);font-weight:400}

/* Skin picker */
.skins{display:flex;gap:12px;position:relative;z-index:1}
.sk{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
.sk:hover{transform:scale(1.15)}
.sk.on{border-color:var(--text);transform:scale(1.15)}
.sk.neon{background:linear-gradient(135deg,#00f5d4,#f700ff)}
.sk.retro{background:linear-gradient(135deg,#33ff33,#00cc00)}
.sk.sunset{background:linear-gradient(135deg,#ff6600,#ff3300)}

/* Difficulty picker */
.diff-wrap{display:flex;gap:8px;position:relative;z-index:1}
.diff-btn{
  font-family:var(--fu);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  background:transparent;border:1px solid var(--dim);color:var(--dim);
  padding:5px 16px;cursor:pointer;transition:all .15s;
}
.diff-btn:hover{border-color:var(--text);color:var(--text)}
.diff-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(0,245,212,.08)}

/* Leaderboard difficulty badge */
.lb-diff{font-family:var(--fu);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);padding:2px 6px;border:1px solid var(--grid);margin-left:6px;vertical-align:middle}

/* ═══ TUTORIAL OVERLAY ══════════════════════════════════════ */
#tutorial{
  position:absolute;inset:0;z-index:25;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.72);gap:16px;
}
#tutorial.hidden{display:none!important}
.tut-hand{font-size:clamp(48px,12vw,72px);animation:tap 1s ease-in-out infinite}
@keyframes tap{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(.85) translateY(6px)}}
.tut-text{font-family:var(--fh);font-size:clamp(18px,5vw,26px);font-weight:900;letter-spacing:3px;color:#fff;text-align:center}
.tut-sub{font-family:var(--fu);font-size:clamp(12px,3vw,14px);letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);text-align:center;max-width:320px}

/* ═══ TOUCH CONTROLS ═══════════════════════════════════════ */
#touch-controls{
  position:absolute;bottom:0;left:0;right:0;height:80px;
  display:none;z-index:15;pointer-events:none;
}
#touch-controls.active{display:flex;justify-content:space-between;align-items:center;padding:0 16px}
.touch-btn{
  pointer-events:auto;
  width:64px;height:64px;border-radius:50%;
  background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-size:24px;color:var(--dim);
  -webkit-tap-highlight-color:transparent;
}
.touch-btn:active{background:rgba(255,255,255,.2);border-color:var(--accent)}
.touch-btn-fire{
  pointer-events:auto;
  width:70px;height:70px;border-radius:50%;
  background:rgba(255,255,255,.06);border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-size:12px;letter-spacing:2px;color:var(--accent);
  -webkit-tap-highlight-color:transparent;
}
.touch-btn-fire:active{background:var(--accent);color:var(--bg)}
.touch-group{display:flex;gap:10px;align-items:center}
</style>
</head>

<script>
'use strict';
// ════════════════════════════════════════════════════════════
//  NEON INVADERS  –  Game Logic  v1.0.0
//  Pure Vanilla JS · No external dependencies
// ════════════════════════════════════════════════════════════

// ── CONFIG ──────────────────────────────────────────────────
const CFG = {
  SHIP_W: 32, SHIP_H: 20, SHIP_SPEED: 4,
  ALIEN_W: 24, ALIEN_H: 18, ALIEN_COLS: 8, ALIEN_ROWS: 4,
  ALIEN_PAD: 12, ALIEN_DROP: 18,
  ALIEN_SPEED: 0.6,
  BULLET_W: 3, BULLET_H: 10, BULLET_SPEED: 6,
  ALIEN_BULLET_SPEED: 3, ALIEN_FIRE_RATE: 70,
  SHIELD_COUNT: 3, SHIELD_W: 40, SHIELD_H: 24,
  UFO_SPEED: 1.5, UFO_INTERVAL: 1200,
  LIVES: 3, LB_MAX: 10,
};

// ── DIFFICULTY PRESETS ───────────────────────────────────────
const DIFF = {
  easy:   { ALIEN_SPEED:0.3, ALIEN_FIRE_RATE:120, ALIEN_BULLET_SPEED:2,   BULLET_SPEED:6, LIVES:4 },
  normal: { ALIEN_SPEED:0.6, ALIEN_FIRE_RATE:70,  ALIEN_BULLET_SPEED:3,   BULLET_SPEED:6, LIVES:3 },
  hard:   { ALIEN_SPEED:1.0, ALIEN_FIRE_RATE:40,  ALIEN_BULLET_SPEED:4.5, BULLET_SPEED:6, LIVES:2 },
};
let curDiff = localStorage.getItem('ni_diff') || 'normal';

function applyDifficulty() {
  const d = DIFF[curDiff];
  for (const k in d) CFG[k] = d[k];
}
applyDifficulty();

// ── PLAYER NAME ──────────────────────────────────────────────
function getPlayerName() {
  const el = document.getElementById('p-name');
  return (el.value || '').trim() || 'Player';
}
{ const saved = localStorage.getItem('ni_name');
  if (saved) document.getElementById('p-name').value = saved; }

// ── CANVAS SETUP ────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  const wrap = document.getElementById('game-wrap');
  W = canvas.width  = Math.min(wrap.clientWidth, 420);
  H = canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ── WEB AUDIO ───────────────────────────────────────────────
let AC = null;
function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  return AC;
}

let ufoOsc = null, ufoGain = null;

function playSound(type) {
  const ac = getAC();
  if (ac.state === 'suspended') ac.resume();
  const now = ac.currentTime;

  if (type === 'shoot') {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + .05);
    gain.gain.setValueAtTime(.12, now);
    gain.gain.exponentialRampToValueAtTime(.001, now + .06);
    osc.start(now); osc.stop(now + .06);
  } else if (type === 'hit') {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, now);
    osc.frequency.exponentialRampToValueAtTime(100, now + .08);
    gain.gain.setValueAtTime(.18, now);
    gain.gain.exponentialRampToValueAtTime(.001, now + .1);
    osc.start(now); osc.stop(now + .1);
  } else if (type === 'explode') {
    const bufSize = ac.sampleRate * 0.2;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize) * 0.3;
    const src = ac.createBufferSource();
    src.buffer = buf;
    src.connect(ac.destination);
    src.start(now);
  } else if (type === 'ufo-start') {
    if (ufoOsc) return;
    const ac2 = getAC();
    ufoOsc = ac2.createOscillator();
    ufoGain = ac2.createGain();
    const lfo = ac2.createOscillator();
    const lfoGain = ac2.createGain();
    lfo.frequency.value = 6;
    lfoGain.gain.value = 50;
    lfo.connect(lfoGain);
    lfoGain.connect(ufoOsc.frequency);
    ufoOsc.type = 'sine';
    ufoOsc.frequency.value = 400;
    ufoGain.gain.value = 0.08;
    ufoOsc.connect(ufoGain);
    ufoGain.connect(ac2.destination);
    ufoOsc.start();
    lfo.start();
    ufoOsc._lfo = lfo;
  } else if (type === 'ufo-stop') {
    if (ufoOsc) {
      try { ufoOsc.stop(); ufoOsc._lfo.stop(); } catch(e){}
      ufoOsc = null; ufoGain = null;
    }
  }
}

// ── LEADERBOARD ──────────────────────────────────────────────
function getLB() { try { return JSON.parse(localStorage.getItem('ni_lb')||'[]'); } catch { return []; } }
function getLBFiltered() { return getLB().filter(e => (e.diff||'normal') === curDiff); }
function getBest() { const lb=getLBFiltered(); return lb.length ? lb[0].score : 0; }

function saveScore(score) {
  let lb = getLB();
  const name = getPlayerName();
  localStorage.setItem('ni_name', name);
  const d = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
  lb.push({ name, score, date:d, diff:curDiff });
  lb.sort((a,b) => b.score - a.score);
  const counts = {};
  lb = lb.filter(e => {
    const k = e.diff||'normal';
    counts[k] = (counts[k]||0) + 1;
    return counts[k] <= CFG.LB_MAX;
  });
  localStorage.setItem('ni_lb', JSON.stringify(lb));
  const filtered = lb.filter(e => (e.diff||'normal') === curDiff);
  return filtered.length > 0 && filtered[0].score === score;
}

function renderLB() {
  const lb = getLBFiltered();
  const el = document.getElementById('lb-table');
  if (!lb.length) { el.innerHTML = '<div class="lb-empty">No scores yet on ' + curDiff.toUpperCase() + '.<br>Be the first!</div>'; return; }
  const m = ['g','s','b'];
  el.innerHTML = lb.slice(0, CFG.LB_MAX).map((e,i) => `
    <div class="lb-row">
      <span class="lb-rank ${m[i]||''}">#${i+1}</span>
      <span class="lb-name">${e.name}<span class="lb-diff">${(e.diff||'normal').toUpperCase()}</span></span>
      <span class="lb-score">${e.score}</span>
    </div>`).join('');
}

// ── HELPERS ─────────────────────────────────────────────────
function cssVar(v) { return getComputedStyle(document.body).getPropertyValue(v).trim(); }

// ── GAME STATE ───────────────────────────────────────────────
let G = {};
let animId = null;
let keys = {};

// ── CREATE ALIEN GRID ───────────────────────────────────────
function createAliens() {
  const aliens = [];
  const totalW = CFG.ALIEN_COLS * (CFG.ALIEN_W + CFG.ALIEN_PAD) - CFG.ALIEN_PAD;
  const startX = (W - totalW) / 2 + CFG.ALIEN_W / 2;
  const startY = 60;

  for (let r = 0; r < CFG.ALIEN_ROWS; r++) {
    for (let c = 0; c < CFG.ALIEN_COLS; c++) {
      let type, points;
      if (r === 0) { type = 'commander'; points = 30; }
      else if (r <= 2) { type = 'soldier'; points = 20; }
      else { type = 'scout'; points = 10; }
      aliens.push({
        x: startX + c * (CFG.ALIEN_W + CFG.ALIEN_PAD),
        y: startY + r * (CFG.ALIEN_H + CFG.ALIEN_PAD),
        w: CFG.ALIEN_W, h: CFG.ALIEN_H,
        type, points, alive: true,
      });
    }
  }
  return aliens;
}

// ── CREATE SHIELDS ──────────────────────────────────────────
function createShields() {
  const shields = [];
  const spacing = W / (CFG.SHIELD_COUNT + 1);
  for (let i = 0; i < CFG.SHIELD_COUNT; i++) {
    const sx = spacing * (i + 1) - CFG.SHIELD_W / 2;
    const sy = H - 130;
    // Shield is a pixel grid (bitmap)
    const cols = CFG.SHIELD_W;
    const rows = CFG.SHIELD_H;
    const pixels = [];
    for (let r = 0; r < rows; r++) {
      pixels[r] = [];
      for (let c = 0; c < cols; c++) {
        // Arch shape
        const cx = c - cols / 2;
        const cy = r;
        const inArch = (cy < rows * 0.65) ?
          (cx * cx / ((cols/2) * (cols/2)) + cy * cy / ((rows*0.9) * (rows*0.9)) < 1) :
          (Math.abs(cx) < cols * 0.45 && !(Math.abs(cx) < cols * 0.2 && cy > rows * 0.6));
        pixels[r][c] = inArch ? 1 : 0;
      }
    }
    shields.push({ x: sx, y: sy, pixels, cols, rows });
  }
  return shields;
}

// ── INIT ─────────────────────────────────────────────────────
function initGame() {
  applyDifficulty();
  G = {
    running: true,
    ship: { x: W / 2, y: H - 50 },
    bullet: null,
    aliens: createAliens(),
    alienBullets: [],
    alienDir: 1,
    alienSpeed: CFG.ALIEN_SPEED,
    alienMoveTimer: 0,
    alienFireTimer: CFG.ALIEN_FIRE_RATE,
    shields: createShields(),
    ufo: null,
    ufoTimer: CFG.UFO_INTERVAL,
    score: 0,
    lives: CFG.LIVES,
    wave: 0,
    particles: [],
    gameOverDelay: 0,
  };
  renderLives();
  document.getElementById('hs').textContent = '0';
  document.getElementById('hb').textContent = getBest();
}

// ── RENDER LIVES ─────────────────────────────────────────────
function renderLives() {
  const el = document.getElementById('lives-wrap');
  el.innerHTML = '';
  for (let i = 0; i < G.lives; i++) {
    const d = document.createElement('div');
    d.className = 'life-icon';
    el.appendChild(d);
  }
}

// ── GAME LOOP ────────────────────────────────────────────────
function gameLoop() {
  update();
  drawFrame();
  if (G.running) animId = requestAnimationFrame(gameLoop);
}

function update() {
  if (!G.running) return;

  // ── Game over delay ───────────────────────────────────────
  if (G.gameOverDelay > 0) {
    G.gameOverDelay--;
    updateParticles();
    if (G.gameOverDelay <= 0) {
      endGame();
    }
    return;
  }

  // ── Ship movement ─────────────────────────────────────────
  if (keys['ArrowLeft'] || keys['KeyA'] || touchState.left) {
    G.ship.x -= CFG.SHIP_SPEED;
  }
  if (keys['ArrowRight'] || keys['KeyD'] || touchState.right) {
    G.ship.x += CFG.SHIP_SPEED;
  }
  G.ship.x = Math.max(CFG.SHIP_W / 2, Math.min(W - CFG.SHIP_W / 2, G.ship.x));

  // ── Player bullet ─────────────────────────────────────────
  if (G.bullet) {
    G.bullet.y -= CFG.BULLET_SPEED;
    if (G.bullet.y < -10) G.bullet = null;
  }

  // ── Alien movement ────────────────────────────────────────
  G.alienMoveTimer++;
  const aliveAliens = G.aliens.filter(a => a.alive);
  // Speed up as fewer aliens remain
  const speedMult = 1 + (1 - aliveAliens.length / (CFG.ALIEN_COLS * CFG.ALIEN_ROWS)) * 2;
  const moveInterval = Math.max(1, Math.floor(10 / (G.alienSpeed * speedMult)));

  if (G.alienMoveTimer >= moveInterval) {
    G.alienMoveTimer = 0;

    // Move aliens laterally
    let shouldDrop = false;
    for (const a of aliveAliens) {
      a.x += G.alienDir * 2;
      if (a.x + CFG.ALIEN_W / 2 >= W - 10 || a.x - CFG.ALIEN_W / 2 <= 10) {
        shouldDrop = true;
      }
    }

    if (shouldDrop) {
      G.alienDir *= -1;
      for (const a of aliveAliens) {
        a.y += CFG.ALIEN_DROP;
      }
    }
  }

  // ── Alien fire ────────────────────────────────────────────
  G.alienFireTimer--;
  if (G.alienFireTimer <= 0) {
    G.alienFireTimer = CFG.ALIEN_FIRE_RATE;
    // Pick a random alive alien from the bottom row of each column
    const bottomAliens = [];
    const colMap = {};
    for (const a of aliveAliens) {
      const col = Math.round(a.x);
      if (!colMap[col] || a.y > colMap[col].y) colMap[col] = a;
    }
    for (const k in colMap) bottomAliens.push(colMap[k]);
    if (bottomAliens.length > 0) {
      const shooter = bottomAliens[Math.floor(Math.random() * bottomAliens.length)];
      G.alienBullets.push({
        x: shooter.x, y: shooter.y + CFG.ALIEN_H / 2,
        vy: CFG.ALIEN_BULLET_SPEED,
      });
    }
  }

  // ── Update alien bullets ──────────────────────────────────
  for (let i = G.alienBullets.length - 1; i >= 0; i--) {
    G.alienBullets[i].y += G.alienBullets[i].vy;
    if (G.alienBullets[i].y > H + 10) G.alienBullets.splice(i, 1);
  }

  // ── UFO ───────────────────────────────────────────────────
  G.ufoTimer--;
  if (G.ufoTimer <= 0 && !G.ufo) {
    const fromLeft = Math.random() < 0.5;
    G.ufo = {
      x: fromLeft ? -30 : W + 30,
      y: 30,
      dir: fromLeft ? 1 : -1,
    };
    G.ufoTimer = CFG.UFO_INTERVAL;
    playSound('ufo-start');
  }
  if (G.ufo) {
    G.ufo.x += G.ufo.dir * CFG.UFO_SPEED;
    if (G.ufo.x < -40 || G.ufo.x > W + 40) {
      G.ufo = null;
      playSound('ufo-stop');
    }
  }

  // ── COLLISION: Player bullet vs aliens ────────────────────
  if (G.bullet) {
    for (const a of G.aliens) {
      if (!a.alive) continue;
      if (G.bullet.x > a.x - a.w/2 && G.bullet.x < a.x + a.w/2 &&
          G.bullet.y > a.y - a.h/2 && G.bullet.y < a.y + a.h/2) {
        a.alive = false;
        G.score += a.points;
        document.getElementById('hs').textContent = G.score;
        document.getElementById('hb').textContent = Math.max(G.score, getBest());
        spawnParticles(a.x, a.y, 8, cssVar('--accent'));
        playSound('hit');
        G.bullet = null;
        break;
      }
    }
  }

  // ── COLLISION: Player bullet vs UFO ───────────────────────
  if (G.bullet && G.ufo) {
    if (Math.abs(G.bullet.x - G.ufo.x) < 20 && Math.abs(G.bullet.y - G.ufo.y) < 12) {
      G.score += 100;
      document.getElementById('hs').textContent = G.score;
      document.getElementById('hb').textContent = Math.max(G.score, getBest());
      spawnParticles(G.ufo.x, G.ufo.y, 12, cssVar('--accent2'));
      playSound('hit');
      G.ufo = null;
      playSound('ufo-stop');
      G.bullet = null;
    }
  }

  // ── COLLISION: Player bullet vs shields ───────────────────
  if (G.bullet) {
    for (const sh of G.shields) {
      const bx = Math.floor(G.bullet.x - sh.x);
      const by = Math.floor(G.bullet.y - sh.y);
      if (bx >= 0 && bx < sh.cols && by >= 0 && by < sh.rows && sh.pixels[by][bx]) {
        // Erode shield area
        for (let dy = -2; dy <= 2; dy++) {
          for (let dx = -2; dx <= 2; dx++) {
            const py = by + dy, px = bx + dx;
            if (py >= 0 && py < sh.rows && px >= 0 && px < sh.cols) {
              sh.pixels[py][px] = 0;
            }
          }
        }
        G.bullet = null;
        break;
      }
    }
  }

  // ── COLLISION: Alien bullets vs ship ──────────────────────
  for (let i = G.alienBullets.length - 1; i >= 0; i--) {
    const b = G.alienBullets[i];
    if (b.x > G.ship.x - CFG.SHIP_W/2 && b.x < G.ship.x + CFG.SHIP_W/2 &&
        b.y > G.ship.y - CFG.SHIP_H/2 && b.y < G.ship.y + CFG.SHIP_H/2) {
      G.alienBullets.splice(i, 1);
      hitShip();
      return;
    }
  }

  // ── COLLISION: Alien bullets vs shields ───────────────────
  for (let i = G.alienBullets.length - 1; i >= 0; i--) {
    const b = G.alienBullets[i];
    let destroyed = false;
    for (const sh of G.shields) {
      const bx = Math.floor(b.x - sh.x);
      const by = Math.floor(b.y - sh.y);
      if (bx >= 0 && bx < sh.cols && by >= 0 && by < sh.rows && sh.pixels[by][bx]) {
        for (let dy = -2; dy <= 2; dy++) {
          for (let dx = -2; dx <= 2; dx++) {
            const py = by + dy, px = bx + dx;
            if (py >= 0 && py < sh.rows && px >= 0 && px < sh.cols) {
              sh.pixels[py][px] = 0;
            }
          }
        }
        destroyed = true;
        break;
      }
    }
    if (destroyed) G.alienBullets.splice(i, 1);
  }

  // ── COLLISION: Aliens reach ship row ──────────────────────
  for (const a of aliveAliens) {
    if (a.y + a.h / 2 >= G.ship.y - CFG.SHIP_H / 2) {
      // Game over — aliens reached the bottom
      G.lives = 0;
      renderLives();
      spawnParticles(G.ship.x, G.ship.y, 20, cssVar('--accent'));
      playSound('explode');
      G.gameOverDelay = 90;
      return;
    }
  }

  // ── Check wave clear ──────────────────────────────────────
  if (aliveAliens.length === 0) {
    G.wave++;
    G.alienSpeed = CFG.ALIEN_SPEED + G.wave * 0.15;
    G.aliens = createAliens();
    G.shields = createShields();
    G.alienDir = 1;
    G.alienBullets = [];
  }

  // ── Update particles ──────────────────────────────────────
  updateParticles();
}

function hitShip() {
  G.lives--;
  renderLives();
  spawnParticles(G.ship.x, G.ship.y, 15, cssVar('--accent'));
  playSound('explode');
  if (G.lives <= 0) {
    G.gameOverDelay = 90;
  }
}

function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 0.5 + Math.random() * 2.5;
    G.particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      color,
    });
  }
}

function updateParticles() {
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) G.particles.splice(i, 1);
  }
}

// ── DRAW ─────────────────────────────────────────────────────
function drawFrame() {
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, cssVar('--bg'));
  bg.addColorStop(1, cssVar('--bg2'));
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = cssVar('--grid') || 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  for (let x=0;x<W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for (let y=0;y<H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  const accent = cssVar('--accent');
  const accent2 = cssVar('--accent2');

  // ── Draw shields ──────────────────────────────────────────
  for (const sh of G.shields) {
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.7;
    for (let r = 0; r < sh.rows; r++) {
      for (let c = 0; c < sh.cols; c++) {
        if (sh.pixels[r][c]) {
          ctx.fillRect(sh.x + c, sh.y + r, 1, 1);
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  // ── Draw aliens ───────────────────────────────────────────
  for (const a of G.aliens) {
    if (!a.alive) continue;
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = accent;
    ctx.shadowBlur = 6;

    if (a.type === 'commander') {
      // Diamond shape
      const hw = a.w/2, hh = a.h/2;
      ctx.beginPath();
      ctx.moveTo(0, -hh);
      ctx.lineTo(hw, 0);
      ctx.lineTo(0, hh);
      ctx.lineTo(-hw, 0);
      ctx.closePath();
      ctx.stroke();
      // Inner detail
      ctx.beginPath();
      ctx.moveTo(0, -hh*0.4);
      ctx.lineTo(hw*0.4, 0);
      ctx.lineTo(0, hh*0.4);
      ctx.lineTo(-hw*0.4, 0);
      ctx.closePath();
      ctx.stroke();
    } else if (a.type === 'soldier') {
      // Inverted triangle
      const hw = a.w/2, hh = a.h/2;
      ctx.beginPath();
      ctx.moveTo(-hw, -hh);
      ctx.lineTo(hw, -hh);
      ctx.lineTo(0, hh);
      ctx.closePath();
      ctx.stroke();
      // Eyes
      ctx.fillStyle = accent;
      ctx.fillRect(-hw*0.35, -hh*0.3, 3, 3);
      ctx.fillRect(hw*0.15, -hh*0.3, 3, 3);
    } else {
      // Scout — rounded square
      const hw = a.w/2 - 2, hh = a.h/2 - 2;
      ctx.beginPath();
      ctx.moveTo(-hw + 3, -hh);
      ctx.lineTo(hw - 3, -hh);
      ctx.quadraticCurveTo(hw, -hh, hw, -hh + 3);
      ctx.lineTo(hw, hh - 3);
      ctx.quadraticCurveTo(hw, hh, hw - 3, hh);
      ctx.lineTo(-hw + 3, hh);
      ctx.quadraticCurveTo(-hw, hh, -hw, hh - 3);
      ctx.lineTo(-hw, -hh + 3);
      ctx.quadraticCurveTo(-hw, -hh, -hw + 3, -hh);
      ctx.closePath();
      ctx.stroke();
      // Little antenna lines
      ctx.beginPath();
      ctx.moveTo(-3, -hh);
      ctx.lineTo(-5, -hh - 5);
      ctx.moveTo(3, -hh);
      ctx.lineTo(5, -hh - 5);
      ctx.stroke();
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ── Draw UFO ──────────────────────────────────────────────
  if (G.ufo) {
    ctx.save();
    ctx.translate(G.ufo.x, G.ufo.y);
    ctx.strokeStyle = accent2;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = accent2;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.ellipse(0, 0, 20, 7, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(0, -3, 9, 5, 0, Math.PI, 0);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ── Draw ship ─────────────────────────────────────────────
  if (G.gameOverDelay <= 0 || G.lives > 0) {
    const s = G.ship;
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.strokeStyle = accent;
    ctx.lineWidth = 2;
    ctx.shadowColor = accent;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(0, -CFG.SHIP_H / 2);
    ctx.lineTo(CFG.SHIP_W / 2, CFG.SHIP_H / 2);
    ctx.lineTo(CFG.SHIP_W * 0.3, CFG.SHIP_H / 4);
    ctx.lineTo(-CFG.SHIP_W * 0.3, CFG.SHIP_H / 4);
    ctx.lineTo(-CFG.SHIP_W / 2, CFG.SHIP_H / 2);
    ctx.closePath();
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ── Draw player bullet ────────────────────────────────────
  if (G.bullet) {
    ctx.fillStyle = accent;
    ctx.shadowColor = accent;
    ctx.shadowBlur = 10;
    ctx.fillRect(G.bullet.x - CFG.BULLET_W/2, G.bullet.y - CFG.BULLET_H/2, CFG.BULLET_W, CFG.BULLET_H);
    ctx.shadowBlur = 0;
  }

  // ── Draw alien bullets ────────────────────────────────────
  for (const b of G.alienBullets) {
    ctx.fillStyle = accent2;
    ctx.shadowColor = accent2;
    ctx.shadowBlur = 8;
    ctx.fillRect(b.x - 2, b.y - 5, 4, 10);
    ctx.shadowBlur = 0;
  }

  // ── Draw particles ────────────────────────────────────────
  for (const p of G.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color || accent;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── PREVIEW ─────────────────────────────────────────────────
function drawPreview() {
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, cssVar('--bg')); bg.addColorStop(1, cssVar('--bg2'));
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  ctx.strokeStyle = cssVar('--grid') || 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  for (let x=0;x<W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for (let y=0;y<H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }

  const accent = cssVar('--accent');
  const t = Date.now() * 0.001;

  // Preview aliens (3 rows of 5)
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 5; c++) {
      const x = W * 0.25 + c * 30 + Math.sin(t + r) * 10;
      const y = H * 0.25 + r * 28;
      ctx.save();
      ctx.translate(x, y);
      ctx.strokeStyle = accent;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = accent;
      ctx.shadowBlur = 6;
      if (r === 0) {
        // Diamond
        ctx.beginPath();
        ctx.moveTo(0,-8); ctx.lineTo(10,0); ctx.lineTo(0,8); ctx.lineTo(-10,0);
        ctx.closePath(); ctx.stroke();
      } else if (r === 1) {
        // Triangle
        ctx.beginPath();
        ctx.moveTo(-10,-7); ctx.lineTo(10,-7); ctx.lineTo(0,7);
        ctx.closePath(); ctx.stroke();
      } else {
        // Rounded square
        ctx.strokeRect(-8,-6,16,12);
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // Preview ship
  ctx.save();
  ctx.translate(W/2, H * 0.7);
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2;
  ctx.shadowColor = accent;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(0, -10);
  ctx.lineTo(16, 10);
  ctx.lineTo(-16, 10);
  ctx.closePath();
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

let previewAnim = null;
function animatePreview() {
  drawPreview();
  previewAnim = requestAnimationFrame(animatePreview);
}

// ── END GAME ─────────────────────────────────────────────────
function endGame() {
  G.running = false;
  playSound('ufo-stop');
  const score = G.score;
  const isNew = saveScore(score);
  document.getElementById('go-n').textContent = score;
  document.getElementById('new-best').style.display = isNew ? 'block' : 'none';
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('lives-wrap').classList.add('hidden');
  document.getElementById('touch-controls').classList.remove('active');
  showScreen('s-go');
}

// ── SCREEN MANAGER ───────────────────────────────────────────
function showScreen(id) {
  ['s-home','s-go','s-lb'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', id === null || s !== id);
  });
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('tutorial').classList.add('hidden');
  document.getElementById('lives-wrap').classList.add('hidden');
  document.getElementById('touch-controls').classList.remove('active');
}

// ── TUTORIAL ─────────────────────────────────────────────────
let tutDone = !!localStorage.getItem('ni_tut');

function dismissTutorial() {
  tutDone = true;
  localStorage.setItem('ni_tut','1');
  document.getElementById('tutorial').classList.add('hidden');
}

function startGame() {
  cancelAnimationFrame(animId);
  cancelAnimationFrame(previewAnim);
  previewAnim = null;
  showScreen(null);
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('lives-wrap').classList.remove('hidden');
  if (isMobile) document.getElementById('touch-controls').classList.add('active');
  initGame();
  if (!tutDone) {
    document.getElementById('tutorial').classList.remove('hidden');
  }
  gameLoop();
}

// ── SHOOTING ────────────────────────────────────────────────
function shoot() {
  if (!G.running || G.bullet || G.gameOverDelay > 0) return;
  G.bullet = {
    x: G.ship.x,
    y: G.ship.y - CFG.SHIP_H / 2,
  };
  playSound('shoot');
}

// ── INPUT ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!tutDone) { dismissTutorial(); return; }
    shoot();
  }
  if (['ArrowLeft','ArrowRight'].includes(e.code)) {
    e.preventDefault();
    if (!tutDone) dismissTutorial();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── TOUCH INPUT ─────────────────────────────────────────────
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let touchState = { left: false, right: false };

function setupTouchBtn(id, stateKey) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); touchState[stateKey] = true; });
  el.addEventListener('touchend', e => { e.preventDefault(); touchState[stateKey] = false; });
  el.addEventListener('touchcancel', e => { touchState[stateKey] = false; });
}
setupTouchBtn('tb-left', 'left');
setupTouchBtn('tb-right', 'right');

document.getElementById('tb-fire').addEventListener('touchstart', e => {
  e.preventDefault();
  if (!tutDone) { dismissTutorial(); return; }
  shoot();
});

// ── BUTTONS ──────────────────────────────────────────────────
document.getElementById('b-play').addEventListener('click', startGame);
document.getElementById('b-restart').addEventListener('click', startGame);
document.getElementById('b-home').addEventListener('click', () => {
  playSound('ufo-stop');
  showScreen('s-home');
  cancelAnimationFrame(previewAnim);
  animatePreview();
});

document.getElementById('b-lb1').addEventListener('click', () => {
  renderLB(); showScreen('s-lb');
  document.getElementById('b-back').dataset.from = 'home';
});
document.getElementById('b-lb2').addEventListener('click', () => {
  renderLB(); showScreen('s-lb');
  document.getElementById('b-back').dataset.from = 'go';
});
document.getElementById('b-back').addEventListener('click', function() {
  showScreen(this.dataset.from === 'go' ? 's-go' : 's-home');
  if (this.dataset.from !== 'go') {
    cancelAnimationFrame(previewAnim);
    animatePreview();
  }
});

// ── SKIN PICKER ──────────────────────────────────────────────
document.querySelectorAll('.sk').forEach(btn => {
  btn.addEventListener('click', () => {
    document.body.className = btn.dataset.skin;
    document.querySelectorAll('.sk').forEach(b => b.classList.toggle('on', b === btn));
    resize();
    if (previewAnim) { cancelAnimationFrame(previewAnim); animatePreview(); }
    else drawPreview();
  });
});

// ── DIFFICULTY PICKER ────────────────────────────────────────
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    curDiff = btn.dataset.diff;
    localStorage.setItem('ni_diff', curDiff);
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('on', b === btn));
  });
});
(function(){
  const saved = localStorage.getItem('ni_diff');
  if (saved) {
    curDiff = saved;
    document.querySelectorAll('.diff-btn').forEach(b =>
      b.classList.toggle('on', b.dataset.diff === saved)
    );
  }
})();

// ── BOOT ─────────────────────────────────────────────────────
showScreen('s-home');
requestAnimationFrame(() => { resize(); animatePreview(); });
</script>
</body>
</html>
